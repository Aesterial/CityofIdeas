name: tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose_check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          if [ -f docker-compose.yml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  go_tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.work
          cache: true
          cache-dependency-path: |
            backend/internal/go.sum
            backend/starter/go.sum

      - name: go test (unit)
        shell: bash
        run: |
          set -euo pipefail
          (cd internal && go test ./... -count=1)
          (cd starter && go test ./... -count=1)

      - name: go test (race)
        shell: bash
        run: |
          set -euo pipefail
          (cd internal && go test ./... -race -count=1)
          (cd starter && go test ./... -race -count=1)

  web_tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: next build
        run: npm run build

      - name: npm test (if script exists)
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
            npm test
          else
            echo "No test script; skipping"
          fi

  integration_smoke:
    if: ${{ needs.compose_check.outputs.exists == 'true' }}
    needs: compose_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report compose env inputs
        shell: bash
        run: |
          set -euo pipefail
          file="docker-compose.yml"
          echo "External env vars referenced in ${file}:"
          vars="$(grep -oE '\\${[A-Za-z_][A-Za-z0-9_]*}' "$file" | tr -d '${}' | sort -u || true)"
          if [ -z "$vars" ]; then
            echo "  (none)"
          else
            for v in $vars; do
              if [ -n "${!v:-}" ]; then
                status="set"
              else
                status="empty"
              fi
              echo "  $v: $status"
            done
          fi

      - name: docker compose config (validate)
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config -q
