syntax = "proto3";

package submissions.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "submissions/domain.proto";

option go_package = "Aesterial/backend/internal/gen/submissions/v1;submissions";

service SubmissionsService {
  rpc List(google.protobuf.Empty) returns (ListResponse) {
    option (google.api.http) = {get: "/api/submissions/list"};
  }
  rpc Get(GetRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/api/submissions/{id}"};
  }
  rpc Approve(ApproveRequest) returns (DataResponse) {
    option (google.api.http) = {
      post: "/api/submissions/{id}/approve"
      body: "*"
    };
  }
  rpc Decline(DeclineRequest) returns (DataResponse) {
    option (google.api.http) = {
      post: "/api/submissions/{id}/decline"
      body: "*"
    };
  }
}
