syntax = "proto3";

package permissions.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "permissions/domain.proto";

option go_package = "Aesterial/backend/internal/gen/permissions/v1;permissions";

service PermissionsService {
  rpc ForRank(RequestForRank) returns (PermissionsResponse) {
    option (google.api.http) = {get: "/api/ranks/{name}/permissions"};
  }
  rpc ForUser(RequestForUser) returns (PermissionsResponse) {
    option (google.api.http) = {get: "/api/user/{userID}/permissions"};
  }
  rpc ChangeForRank(RequestForRankChange) returns (EmptyResponse) {
    option (google.api.http) = {
      patch: "/api/ranks/{name}/permissions"
      body: "*"
    };
  }
  rpc ChangeForUser(RequestForUserChange) returns (EmptyResponse) {
    option (google.api.http) = {
      patch: "/api/user/{userID}/permissions"
      body: "*"
    };
  }
  rpc Get(google.protobuf.Empty) returns (PermissionsResponse) {
    option (google.api.http) = {get: "/api/permissions/list"};
  }
}
