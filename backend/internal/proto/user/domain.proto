syntax = "proto3";

package user.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "Aesterial/backend/internal/gen/user/v1;user";

message UserPublic {
  uint32 userID = 1;
  string username = 2;
  Rank rank = 3;
  optional UserPublicSettings settings = 4;
  bool banned = 5;
  google.protobuf.Timestamp joinedAt = 6;
}

message UserSelf {
  UserPublic public = 1;
  UserEmail email = 2;
}

message Avatar {
  string contentType = 1;
  bytes data = 2;
  string url = 3;
  string key = 4;
}

message UserSettings {
  optional string displayName = 1;
  optional Avatar avatar = 2;
  int32 sessionLiveTime = 3;
}

message UserPublicSettings {
  optional string displayName = 1;
  optional Avatar avatar = 2;
}

message Rank {
  string name = 1;
  optional google.protobuf.Timestamp expires = 2;
}

message UserEmail {
  string address = 1;
  bool verified = 2;
}

message UserSessions {
  repeated Session sessions = 1;
}

message Session {
  string uuid = 1;
  uint32 uid = 2;
  google.protobuf.Timestamp created = 3;
  google.protobuf.Timestamp lastSeen = 4;
  google.protobuf.Timestamp expires = 5;
}

message OtherUserRequest {
  uint32 userID = 1;
}

message BanUserRequest {
  uint32 userID = 1;
  string reason = 2;
  optional google.protobuf.Duration duration = 3;
}

message SendMessageRequest {
  uint32 userID = 1;
  string message = 2;
}

message Message {
  string from = 1;
  string text = 2;
  google.protobuf.Timestamp at = 3;
}

message ChangeSelfNameRequest {
  string name = 1;
}

message UserSelfResponse {
  UserSelf data = 1;
  string tracing = 2;
}

message UserPublicResponse {
  UserPublic data = 1;
  string tracing = 2;
}

message UsersResponse {
  repeated UserPublic data = 1;
  string tracing = 2;
}

message UserSessionsResponse {
  UserSessions data = 1;
  string tracing = 2;
}

message MessagesResponse {
  repeated Message messages = 1;
  string tracing = 2;
}

message EmptyResponse {
  string tracing = 1;
}

message BanInfoResponse {
  string id = 1;
  UserPublic executor = 2;
  string reason = 3;
  google.protobuf.Timestamp at = 4;
  optional google.protobuf.Timestamp expires = 5;
  string tracing = 6;
}

message HasPermissionRequest {
  uint32 userID = 1;
  string perm = 2;
}

message PermissionsRequest {
  uint32 userID = 1;
}

message PermissionsResponse {
  Permissions perms = 1;
  string tracing = 2;
}

message HasPermissionResponse {
  bool has = 1;
  string tracing = 2;
}

message Permissions {
  message projects_permissions_t {
    message update_t {
      bool all = 1;
      bool own = 2;
      bool any = 3;
    }
    message archive_t {
      bool own = 1;
      bool any = 2;
    }
    message delete_t {
      bool all = 1;
      bool own = 2;
      bool any = 3;
    }
    bool all = 1;
    bool create = 2;
    bool view = 3;
    bool vote = 4;
    update_t update = 5;
    archive_t archive = 6;
    delete_t delete = 7;
  }

  message tickets_permissions_t {
    message view_list_t {
      bool own = 1;
      bool any = 2;
    }
    message message_create_t {
      bool all = 1;
      bool accepted = 2;
      bool any = 3;
    }
    message message_t {
      message_create_t create = 1;
    }
    message close_t {
      bool all = 1;
      bool accepted = 2;
      bool any = 3;
    }
    bool all = 1;
    bool create = 2;
    view_list_t view_list = 3;
    bool accept = 4;
    message_t message = 5;
    close_t close = 6;
  }

  message submissions_permissions_t {
    bool all = 1;
    bool view = 2;
    bool accept = 3;
    bool decline = 4;
  }

  message ranks_permissions_t {
    bool all = 1;
    bool perms_change = 2;
    bool add = 3;
    bool delete = 4;
    bool edit = 5;
  }

  message statistics_permissions_t {
    message activity_t {
      message users_t {
        bool period = 1;
      }
      bool all = 1;
      users_t users = 2;
    }
    message submissions_t {
      bool all = 1;
      bool recap = 2;
    }
    message votes_t {
      message categories_t {
        bool top = 1;
      }
      bool all = 1;
      categories_t categories = 2;
    }
    message media_t {
      bool all = 1;
      bool quality = 2;
      bool volume = 3;
    }
    bool all = 1;
    activity_t activity = 2;
    submissions_t submissions = 3;
    votes_t votes = 4;
    media_t media = 5;
  }

  message users_permissions_t {
    message view_t {
      message profile_t {
        bool public = 1;
        bool privacy = 2;
      }
      bool all = 1;
      profile_t profile = 2;
    }
    message settings_t {
      message change_t {
        message name_t {
          bool own = 1;
          bool any = 2;
        }
        message description_t {
          bool own = 1;
        }
        name_t name = 1;
        description_t description = 2;
      }
      message delete_t {
        message profile_t {
          bool own = 1;
        }
        message avatar_t {
          bool own = 1;
          bool any = 2;
        }
        message description_t {
          bool own = 1;
          bool any = 2;
        }
        profile_t profile = 1;
        avatar_t avatar = 2;
        description_t description = 3;
      }
      message reset_t {
        message password_t {
          bool own = 1;
          bool any = 2;
        }
        bool all = 1;
        password_t password = 2;
      }
      bool all = 1;
      change_t change = 2;
      delete_t delete = 3;
      reset_t reset = 4;
    }
    message moderation_t {
      message set_t {
        bool all = 1;
        bool rank = 2;
      }
      bool all = 1;
      bool ban = 2;
      bool ban_forever = 3;
      bool unban = 4;
      set_t set = 5;
    }
    bool all = 1;
    view_t view = 2;
    settings_t settings = 3;
    moderation_t moderation = 4;
  }
  bool all = 1;
  projects_permissions_t projects = 2;
  tickets_permissions_t tickets = 3;
  submissions_permissions_t submissions = 4;
  statistics_permissions_t statistics = 5;
  users_permissions_t users = 6;
  ranks_permissions_t ranks = 7;
}
